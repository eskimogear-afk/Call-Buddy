<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
.card{width:1200px;height:630px;background:#0E1320;position:relative;font-family:'Inter',sans-serif;display:flex;flex-direction:column;justify-content:center;padding:0 90px}
.grid{position:absolute;inset:0;background-image:linear-gradient(#2A3551 1px,transparent 1px),linear-gradient(90deg,#2A3551 1px,transparent 1px);background-size:60px 60px;opacity:.25;-webkit-mask-image:radial-gradient(ellipse 80% 70% at 30% 0%,#000 20%,transparent 70%)}
.glow{position:absolute;top:-120px;right:-100px;width:760px;height:560px;background:radial-gradient(ellipse 50% 55% at 60% 40%,rgba(91,163,247,.42),transparent 62%),radial-gradient(ellipse 70% 60% at 50% 50%,rgba(125,184,255,.16),transparent 66%);filter:blur(8px)}
.brand{display:flex;align-items:center;gap:16px;margin-bottom:40px;position:relative}
.mk{width:62px;height:62px;border-radius:16px;background:linear-gradient(135deg,#5BA3F7,#3B82E0);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(91,163,247,.4)}
.bn{font-family:'Plus Jakarta Sans';font-weight:800;font-size:40px;color:#EAEDF4;letter-spacing:-1px}
h1{font-family:'Plus Jakarta Sans';font-weight:700;font-size:74px;line-height:1.06;letter-spacing:-2.5px;color:#fff;position:relative;max-width:980px}
h1 .b{background:linear-gradient(120deg,#7DB8FF,#5BA3F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{margin-top:30px;font-size:30px;color:#9BA6BC;font-weight:400;position:relative;letter-spacing:-.3px}
.pill{position:absolute;bottom:54px;left:90px;display:inline-flex;align-items:center;gap:10px;background:rgba(91,163,247,.12);border:1px solid rgba(91,163,247,.4);color:#7DB8FF;font-size:21px;font-weight:600;padding:10px 22px;border-radius:99px}
</style></head>
<body><div class="card">
<div class="grid"></div><div class="glow"></div>
<div class="brand"><div class="mk"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg></div><div class="bn">PitchLog</div></div>
<h1>Every call logged.<br>Every follow-up booked. <span class="b">Zero typing.</span></h1>
<div class="sub">The AI cold-call CRM for mortgage loan officers</div>
<div class="pill">📞 Free for 25 calls a month — no card</div>
</div></body></html>
